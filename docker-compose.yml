version: "3.8"

services:
  engine:
    build: .
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./config:/app/config:ro
      - ./build:/app/build
      - ./references:/app/references:ro
      - ./scripts:/app/scripts:ro
      - ./adapters:/app/adapters:ro
      - ./examples:/app/examples:ro
    environment:
      - MCE_OUTPUT_DIR=build/output
      - MCE_WORKFLOW_DIR=build/workflows
