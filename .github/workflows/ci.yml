name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run unit and integration tests
        run: python -m pytest -q tests --ignore=tests/live_service_test.py

      - name: Run end-to-end HTTP workflow test
        run: python tests/e2e_http_workflow.py
